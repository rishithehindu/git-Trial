<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Cards</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100">

    <div class="max-w-6xl mx-auto p-6">

        <!-- Page Title -->
        <h1 class="text-3xl font-bold text-center mb-6">Student List</h1>

        <!-- Create Button -->
        <div class="text-center mb-6">
            <a href="/student/add-student" 
               class="inline-block bg-green-500 text-white px-4 py-2 rounded hover:bg-green-600">
               Add Student
            </a>
        </div>

        <!-- Student Cards -->
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6">

            {% for student in students_data %}

            <div class="bg-white shadow-lg rounded-xl p-6">


                <h2 class="text-xl font-semibold mb-2">
                    {{ student.name }}
                </h2>

                <p class="text-gray-600">
                    Email: {{ student.email }}
                </p>

                <p class="text-gray-600 mb-4">
                    Phone number: {{ student.phone_number }}
                </p>

                <div class="flex gap-2">


                    <a href="{% url 'update_student' student.id %}" class="bg-yellow-500 text-white px-3 py-1 rounded hover:bg-yellow-600">
                        Update
                    </a>

                    <a href="{% url 'delete_student' student.id %}" class="bg-red-500 text-white px-3 py-1 rounded hover:bg-red-600">
                        Delete
                    </a>

                </div>

            </div>

            {% endfor %}

        </div>

    </div>

</body>
</html>
